name: Android Build & Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    name: Build APK and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating GitHub Releases

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Ensure Capacitor and Android Platform
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # Initialize Capacitor if not already initialized
          npx cap init Hasboba com.hasboba.app --web-dir=dist || true
          # Add Android platform if it doesn't exist
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Build Web App
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK for Release
        run: |
          # Copy and rename the generated APK to the workspace root
          cp android/app/build/outputs/apk/debug/app-debug.apk Hasboba-App.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hasboba-App-Artifact
          path: Hasboba-App.apk

      - name: Generate Release Tag
        run: echo "RELEASE_TAG=v1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release ${{ env.RELEASE_TAG }}
          files: Hasboba-App.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
